protocol:
  min_challenges: 2
  min_concessions: 1
  max_turns: 8
  max_time_minutes: 15
  token_budget: 100000
  repetition_tolerance: 1
  require_full_resolution: false
  require_steelman: false
  max_steelman_attempts: 2

agents:
  proposition:
    model: claude-sonnet-4-6
    temperature: 0.7
    max_claims: 5
  opposition:
    model: gpt-4o
    temperature: 0.4
    aggression: 0.8
  moderator:
    model: claude-opus-4-8
    temperature: 0.3
    auto_generate_title: true

output:
  generate_markdown: true
  store_argument_trace: true
  score_final_output: true
