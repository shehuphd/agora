agent_settings:
  history_window: 6
agents:
  moderator:
    auto_generate_title: true
    model: claude-haiku-4-5
    temperature: 0.3
  opposition:
    aggression: 0.8
    model: claude-opus-4-8
    temperature: 0.4
  proposition:
    max_claims: 5
    model: claude-sonnet-4-6
    temperature: 0.7
output:
  generate_markdown: true
  score_final_output: true
  store_argument_trace: true
protocol:
